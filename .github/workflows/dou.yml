name: DOU Diário

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  executar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Instalar dependências
        run: pip install requests psycopg2-binary

      - name: Rodar script
        run: python script.py
